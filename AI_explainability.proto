// AFTER ANY change to this file, regenerate the Python stubs by running:
// python -m grpc_tools.protoc --proto_path=. --python_out=. --grpc_python_out=. AI_explainability.proto

// This will regenerate:
//   - AI_explainability_pb2.py
//   - AI_explainability_pb2_grpc.py

syntax = "proto3";

package shap_explainer;

// Represents one entry in output_labels - mirrors config.json output_labels
message OutputLabel {
  string index   = 1;   // "0", "1", "2" ...
  string label   = 2;   // "Power Forecast" OR "OFF" (class 0 for classification)
  string label_1 = 3;   // "ON" (class 1) — only for classification, empty for regression
  string name    = 4;   // "Generator 1" — only for multioutput classification
  repeated string extra_labels = 5;  // class 2, 3, 4... (multi-class)

}

// Request

message ExplainRequest {

  // Routing - mirrors config.json
  string analysis   = 1;   // "tabular" | "timeseries"
  string package    = 2;   // "sklearn" | "pytorch"
  string model_type = 3;   // "random_forest" | "decision_tree" | "lstm"

  // Artifacts as raw bytes (replaces file paths from config.json)
  bytes model_file           = 4;   // model_path  .pkl or .pth
  bytes dataset_file         = 5;   // dataset_path  .csv, xlsx, .pt
  bytes background_data_file = 6;   // background_data_path  .pt (LSTM only)
  bytes test_data_file       = 7;   // test_data_path  .pt  (LSTM only)

  // Feature / target metadata - mirrors config.json
  repeated string      feature_names = 8;   // repeated means that we can write all inputs
  repeated OutputLabel output_labels = 9;

  // Timeseries-specific - mirrors config.json (leave empty for tabular)
  string explainer_type = 10;   // "tree" | "gradient"
  int32  input_dim      = 11;
  int32  hidden_size    = 12;
  int32  look_back      = 13;
  int32  look_ahead     = 14;

  // NOTE: dataset_scope is always "whole" (so why don't ask client to choose)
  // NOTE: save_excel is always true
  // NOTE: generate_notebook is always true
  // These are handled automatically by the server - no need to send them
}

// One result row: one sample x one output target

message ShapRow {
  int32          target_index    = 1;
  string         target_name     = 2;
  int32          sample_index    = 3;
  repeated float feature_values  = 4;   // Values of features for this sample
  int32          prediction      = 5;   // classification (0 or 1)
  float          prediction_cont = 6;   // regression / LSTM (float as we have numbers)
  repeated float shap_values     = 7;   // SHAP values for every feature
}

// Response

message ExplainResponse {
  bool   success       = 1;   // true if pipeline ran successfully, false on error
  string message       = 2;   // "OK rows computed" or error description

  repeated ShapRow shap_rows = 3;   // after features names

  bytes excel_file    = 4;   // .xlsx - always returned
  bytes notebook_file = 5;   // .ipynb - always returned
}

// Health check

// Health check is the way to check in milliseconds if the server runs
// and is ready before you sent your request
// if the server doesnt run it will wait 5 minutes
// and then you ll get timeout error

message HealthRequest  {}
message HealthResponse { string status = 1; }

// Service

service ShapExplainerService {
  // rpc stands for Remote Procedure Call - call a function on a remote server

  rpc Explain     (ExplainRequest) returns (ExplainResponse);
  rpc HealthCheck (HealthRequest)  returns (HealthResponse);
}

// service is like contract between client and server both know exactly what they can
// ask for and what they ll get back, so if you try call something that is not in the
// service .proto will give error